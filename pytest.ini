[pytest]
# ── Test discovery ─────────────────────────────────────────────────────────────
# Tell pytest where to look for tests
testpaths = tests

# ── Verbosity ─────────────────────────────────────────────────────────────────
# -v  : show each test name individually (not just pass/fail count)
# -s  : show print() output (useful to see [DeepEval] / [MLflow] log lines)
addopts = -v -s

# ── Warnings ──────────────────────────────────────────────────────────────────
# Suppress noisy deprecation warnings from third-party libraries
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
